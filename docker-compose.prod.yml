version: '3.8'

services:
  # ----------------------------------------------------------
  # PostgreSQL Database (Production)
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: yulsoft-quote-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yulsoft_quote}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 프로덕션에서는 포트 노출 안 함 (내부 네트워크만)
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - yulsoft-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis (Production)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: yulsoft-quote-redis-prod
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - yulsoft-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend API (Production)
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: yulsoft-quote-api-prod
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-yulsoft_quote}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - BACKEND_CORS_ORIGINS=["https://quote.yulsoft.kr","https://yulsoft.kr"]
      - WEASYPRINT_GTK_PATH=/usr/lib/x86_64-linux-gnu
    # 프로덕션에서는 볼륨 마운트 안 함 (이미지에 코드 포함)
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - yulsoft-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      replicas: 2  # 로드밸런서 뒤에서 2개 이상 실행 권장
    restart: unless-stopped

  # ----------------------------------------------------------
  # Celery Worker (Production)
  # ----------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: yulsoft-quote-worker-prod
    command: celery -A app.tasks.celery_app worker -l INFO -Q pdf,email,cleanup --concurrency=4 --prefetch-multiplier=1
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-yulsoft_quote}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yulsoft-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      replicas: 2
    restart: unless-stopped

  # ----------------------------------------------------------
  # Celery Beat (Production) - 단일 인스턴스만 실행
  # ----------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: yulsoft-quote-beat-prod
    command: celery -A app.tasks.celery_app beat -l INFO --scheduler redbeat.RedBeatScheduler
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-yulsoft_quote}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yulsoft-network
    deploy:
      replicas: 1
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx Reverse Proxy (SSL Termination)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: yulsoft-quote-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/var/www/static:ro
    depends_on:
      - api
    networks:
      - yulsoft-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  yulsoft-network:
    driver: bridge