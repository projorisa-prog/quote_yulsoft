services:
  # PostgreSQL Database
  - type: pserv
    name: yulsoft-db
    plan: starter
    region: singapore
    ipAllowList: []
    postgresMajorVersion: "16"
    databaseName: yulsoft_quote
    user: yulsoft
    
  # Backend API Service
  - type: web
    name: yulsoft-api
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yulsoft-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: "https://yulsoft-quote-frontend.onrender.com,https://quote.yulsoft.kr"
      - key: WEASYPRINT_GTK_PATH
        value: "/usr/lib/x86_64-linux-gnu"
    healthCheckPath: /health
    autoDeploy: true

